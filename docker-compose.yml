# 진성레이져 사이트 배포 구성: app(Next.js+Payload) + Caddy(자동 HTTPS)
# 사용:  docker compose up -d --build
# 필요:  .env 파일 (.env.example 참고) + DOMAIN, ACME_EMAIL 환경변수

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # SQLite·미디어는 마운트된 볼륨 경로 사용 (.env 값보다 우선)
      DATABASE_URI: file:./data/jinsung.db
      NODE_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - app_data:/app/data # SQLite DB
      - app_media:/app/media # 업로드 이미지
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_data:
  app_media:
  caddy_data:
  caddy_config:
